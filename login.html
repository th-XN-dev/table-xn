<!DOCTYPE html>
<html lang="uz" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Kirish — table.xn</title>
  <meta name="theme-color" content="#4f46e5" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="table.xn" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/theme.css" />
  <script>
    (function () { var t = localStorage.getItem('tablexn.theme'); if (!t) t = matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light'; document.documentElement.setAttribute('data-theme', t); })();
  </script>
  <style>
    .auth-wrap { min-height: 100vh; display: grid; place-items: center; padding: 28px 18px; }
    .theme-fab { position: fixed; top: 20px; right: 20px; z-index: 10; }
    .auth-card { width: 100%; max-width: 430px; padding: 34px 30px 30px; }
    .auth-head { text-align: center; margin-bottom: 24px; }
    .auth-head .brand { justify-content: center; margin-bottom: 18px; }
    .auth-title { font-size: 1.5rem; font-weight: 800; letter-spacing: -0.03em; }
    .auth-sub { color: var(--text-muted); font-size: 0.92rem; margin-top: 5px; }
    .tabs { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; padding: 5px; border-radius: 15px; margin-bottom: 22px; background: var(--surface-2); box-shadow: var(--clay-inset); }
    .tab { border: none; background: transparent; cursor: pointer; padding: 11px; border-radius: 11px; font-weight: 600; font-size: 0.9rem; color: var(--text-muted); transition: color 0.18s ease; }
    .tab[aria-selected='true'] { color: var(--primary-600); background: var(--surface); box-shadow: var(--clay-sm); }
    .form { display: flex; flex-direction: column; gap: 15px; }
    .signup-only { display: none; }
    [data-mode='signup'] .signup-only { display: flex; }
    .msg { display: none; padding: 12px 15px; border-radius: 13px; font-size: 0.87rem; font-weight: 500; }
    .msg.show { display: block; }
    .msg.error { background: rgba(239, 68, 68, 0.12); color: var(--danger); }
    .msg.ok { background: rgba(34, 197, 94, 0.13); color: var(--success); }
    .auth-foot { text-align: center; margin-top: 18px; font-size: 0.82rem; color: var(--text-soft); }
  </style>
</head>
<body data-mode="login">
  <div class="aura"><span class="a1"></span><span class="a2"></span></div>

  <button class="icon-btn theme-fab" id="themeToggle" type="button" aria-label="Mavzu">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="4" /><path d="M12 2v2M12 20v2M2 12h2M20 12h2M5 5l1.5 1.5M17.5 17.5L19 19M19 5l-1.5 1.5M6.5 17.5L5 19" /></svg>
  </button>

  <main class="auth-wrap">
    <section class="clay auth-card">
      <div class="auth-head">
        <div class="brand">
          <span class="brand-mark" aria-hidden="true"><svg width="22" height="22" viewBox="0 0 24 24" fill="none"><rect x="3" y="4" width="18" height="16" rx="4" stroke="#fff" stroke-width="2" /><path d="M3 9h18M9 9v11" stroke="#fff" stroke-width="2" /></svg></span>
          <span class="brand-name">table<span class="dot">.xn</span></span>
        </div>
        <h1 class="auth-title" id="title">Xush kelibsiz</h1>
        <p class="auth-sub" id="subtitle">Hisobingizga kiring</p>
      </div>

      <div class="tabs" role="tablist">
        <button class="tab" id="tabLogin" role="tab" aria-selected="true" type="button">Kirish</button>
        <button class="tab" id="tabSignup" role="tab" aria-selected="false" type="button">Ro'yxatdan o'tish</button>
      </div>

      <div class="msg" id="msg" role="alert"></div>

      <form class="form" id="form" novalidate>
        <div class="field signup-only">
          <label class="label" for="orgName">Tashkilot nomi</label>
          <input class="input" id="orgName" type="text" autocomplete="organization" placeholder="Masalan: Jony Kids" />
        </div>
        <div class="field signup-only">
          <label class="label" for="fullName">To'liq ism</label>
          <input class="input" id="fullName" type="text" autocomplete="name" placeholder="Ism Familiya" />
        </div>
        <div class="field">
          <label class="label" for="username">Foydalanuvchi nomi</label>
          <input class="input" id="username" type="text" autocomplete="username" placeholder="masalan: aziz" autocapitalize="none" spellcheck="false" required />
        </div>
        <div class="field">
          <label class="label" for="password">Parol</label>
          <input class="input" id="password" type="password" autocomplete="current-password" placeholder="••••••••" minlength="6" required />
        </div>

        <button class="btn btn-primary btn-block" id="submit" type="submit">Kirish</button>
      </form>

      <p class="auth-foot" id="authFoot">table.xn — by project.xn</p>
    </section>
  </main>

  <script type="module">
    import { signIn, signUp, redirectIfAuthed } from './js/api/auth.js';
    import { bindThemeToggle } from './js/utils/theme.js';
    import { APP_VERSION } from './js/utils/version.js';

    document.getElementById('authFoot').textContent = `table.xn · v${APP_VERSION} · by project.xn`;
    bindThemeToggle(document.getElementById('themeToggle'));
    redirectIfAuthed();

    const body = document.body;
    const els = {
      tabLogin: document.getElementById('tabLogin'), tabSignup: document.getElementById('tabSignup'),
      title: document.getElementById('title'), subtitle: document.getElementById('subtitle'),
      submit: document.getElementById('submit'), msg: document.getElementById('msg'), form: document.getElementById('form'),
      username: document.getElementById('username'), password: document.getElementById('password'),
      orgName: document.getElementById('orgName'), fullName: document.getElementById('fullName'),
    };

    function setMode(mode) {
      body.dataset.mode = mode;
      const login = mode === 'login';
      els.tabLogin.setAttribute('aria-selected', String(login));
      els.tabSignup.setAttribute('aria-selected', String(!login));
      els.title.textContent = login ? 'Xush kelibsiz' : 'Hisob yarating';
      els.subtitle.textContent = login ? 'Hisobingizga kiring' : 'Tashkilotingizni ro\'yxatdan o\'tkazing';
      els.submit.textContent = login ? 'Kirish' : 'Hisob yaratish';
      els.password.autocomplete = login ? 'current-password' : 'new-password';
      hideMsg();
    }
    els.tabLogin.onclick = () => setMode('login');
    els.tabSignup.onclick = () => setMode('signup');

    function showMsg(text, type = 'error') { els.msg.textContent = text; els.msg.className = `msg show ${type}`; }
    function hideMsg() { els.msg.className = 'msg'; }

    function friendly(err) {
      const m = (err?.message || '').toLowerCase();
      if (m.includes('invalid login')) return "Foydalanuvchi nomi yoki parol noto'g'ri.";
      if (m.includes('already registered')) return "Bu foydalanuvchi nomi allaqachon band.";
      if (m.includes('password should be at least')) return "Parol kamida 6 ta belgidan iborat bo'lishi kerak.";
      if (m.includes('profile already exists')) return "Bu foydalanuvchida tashkilot allaqachon mavjud.";
      return err?.message || "Xatolik yuz berdi. Birozdan so'ng qayta urinib ko'ring.";
    }

    function loading(on) {
      els.submit.disabled = on;
      els.submit.innerHTML = on ? '<span class="spinner"></span>' : (body.dataset.mode === 'login' ? 'Kirish' : 'Hisob yaratish');
    }

    els.form.addEventListener('submit', async (e) => {
      e.preventDefault();
      hideMsg();
      const username = els.username.value.trim().replace(/\s+/g, '');
      const password = els.password.value;
      const mode = body.dataset.mode;
      if (!username || !password) { showMsg('Foydalanuvchi nomi va parolni kiriting.'); return; }
      if (password.length < 6) { showMsg("Parol kamida 6 ta belgidan iborat bo'lishi kerak."); return; }

      loading(true);
      try {
        if (mode === 'login') {
          await signIn({ username, password });
          location.href = 'dashboard.html';
        } else {
          const orgName = els.orgName.value.trim();
          const fullName = els.fullName.value.trim();
          if (!orgName) { showMsg('Tashkilot nomini kiriting.'); loading(false); return; }
          const res = await signUp({ username, password, orgName, ownerName: fullName });
          if (res.pendingConfirmation) { showMsg('Hisob yaratildi. Endi kiring.', 'ok'); loading(false); return; }
          location.href = 'dashboard.html';
        }
      } catch (err) { showMsg(friendly(err)); loading(false); }
    });

    setMode('login');
  </script>
  <script type="module">import { registerSW } from './js/pwa/registerSW.js'; registerSW();</script>
</body>
</html>
