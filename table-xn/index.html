<!DOCTYPE html>
<html lang="uz" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>table.xn</title>
  <meta name="theme-color" content="#4f46e5" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="table.xn" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/theme.css" />
  <script>
    (function () {
      var t = localStorage.getItem('tablexn.theme');
      if (!t) t = matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
      document.documentElement.setAttribute('data-theme', t);
    })();
  </script>
  <style>
    .splash { min-height: 100vh; display: grid; place-items: center; }
    .splash-card { display: flex; flex-direction: column; align-items: center; gap: 18px; }
    .splash .brand-mark { width: 58px; height: 58px; border-radius: 18px; animation: float 2.4s ease-in-out infinite; }
    @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-7px); } }
    .splash .spinner { border-color: var(--border); border-top-color: var(--primary); }
  </style>
</head>
<body>
  <div class="aura"><span class="a1"></span><span class="a2"></span></div>
  <main class="splash">
    <div class="splash-card">
      <div class="brand-mark" aria-hidden="true">
        <svg width="30" height="30" viewBox="0 0 24 24" fill="none">
          <rect x="3" y="4" width="18" height="16" rx="4" stroke="#fff" stroke-width="2" />
          <path d="M3 9h18M9 9v11" stroke="#fff" stroke-width="2" />
        </svg>
      </div>
      <div class="spinner" role="status" aria-label="Yuklanmoqda"></div>
    </div>
  </main>

  <script type="module">
    import { getSession } from './js/api/auth.js';
    (async () => {
      try {
        const session = await getSession();
        location.replace(session ? 'dashboard.html' : 'login.html');
      } catch {
        location.replace('login.html');
      }
    })();
  </script>
  <script type="module">import { registerSW } from './js/pwa/registerSW.js'; registerSW();</script>
</body>
</html>
