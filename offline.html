<!DOCTYPE html>
<html lang="uz" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Offline — table.xn</title>
  <meta name="theme-color" content="#4f46e5" />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/theme.css" />
  <script>
    (function () {
      var t = localStorage.getItem('tablexn.theme');
      if (!t) t = matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
      document.documentElement.setAttribute('data-theme', t);
    })();
  </script>
  <style>
    .wrap { min-height: 100vh; display: grid; place-items: center; padding: 24px; }
    .card { max-width: 420px; text-align: center; padding: 38px 30px; }
    .ico { width: 70px; height: 70px; margin: 0 auto 18px; border-radius: 20px; display: grid; place-items: center;
      background: var(--surface-2); box-shadow: var(--clay-inset); color: var(--text-soft); }
    h1 { font-size: 1.4rem; margin-bottom: 8px; }
    p { color: var(--text-muted); margin-bottom: 22px; }
  </style>
</head>
<body>
  <div class="aura"><span class="a1"></span><span class="a2"></span></div>
  <main class="wrap">
    <section class="clay card">
      <div class="ico" aria-hidden="true">
        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M1 1l22 22M16.72 11.06A10.94 10.94 0 0 1 19 12.55M5 12.55a10.94 10.94 0 0 1 5.17-2.39M10.71 5.05A16 16 0 0 1 22.58 9M1.42 9a15.91 15.91 0 0 1 4.7-2.88M8.53 16.11a6 6 0 0 1 6.95 0M12 20h.01"/>
        </svg>
      </div>
      <h1>Internet yo'q</h1>
      <p>Ulanish tiklanganda sahifa avtomatik ishlaydi. Kiritilgan ma'lumotlar navbatda saqlanadi va internet qaytganda yuboriladi.</p>
      <button class="btn btn-primary" onclick="location.reload()">Qayta urinish</button>
    </section>
  </main>
</body>
</html>
